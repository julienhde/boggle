<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="robots" content="noindex">
<title>Boggle entre amis — admin</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<script type="module" src="js/admin.js"></script>
</head>
<body>

<h1>BOGGLE ENTRE AMIS <span class="admin-badge">admin</span></h1>
<div class="dict-status" id="dictStatus">Chargement du dictionnaire…</div>

<div class="seed-row">
  <label for="seedInput">Grille n°</label>
  <input type="text" id="seedInput" inputmode="numeric" placeholder="ex : 42">
  <button id="loadSeedBtn">Charger</button>
  <button id="randomSeedBtn">🎲</button>
</div>

<div id="feedback">&nbsp;</div>

<div id="grid"></div>

<div id="results" hidden>
  <div class="big" id="resWordCount"></div>
  <div id="resLongest"></div>
  <div id="resMaxScores"></div>
</div>

<div class="start-row">
  <button id="toggleWordsBtn" hidden>Afficher tous les mots</button>
</div>

<div id="allWords" hidden></div>

</body>
</html>
