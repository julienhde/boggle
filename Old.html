<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boggle PEI</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior: none; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 12px 40px;
    min-height: 100vh;
  }
  h1 { font-size: 22px; margin: 6px 0 2px; letter-spacing: 2px; }

  .dict-status {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 8px;
    text-align: center;
  }
  .dict-status.ready { color: #4ade80; }
  .dict-status.error { color: #f87171; }

  .seed-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    width: min(94vw, 420px);
  }
  .seed-row label { font-size: 13px; color: #aaa; white-space: nowrap; }
  .seed-row input {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #444d7c;
    background: #16213e;
    color: #eee;
    font-size: 16px;
    text-align: center;
  }
  .seed-row button {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background: #444d7c;
    color: #eee;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .seed-row button:active { background: #5a659e; }

  .mode-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    width: min(94vw, 420px);
  }
  .mode-row label { font-size: 13px; color: #aaa; white-space: nowrap; }
  .mode-row select {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #444d7c;
    background: #16213e;
    color: #eee;
    font-size: 14px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: min(94vw, 420px);
    margin-bottom: 8px;
  }
  #timer { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
  #timer.low { color: #f87171; }
  #score { font-size: 18px; color: #7dd3fc; font-weight: 600; }

  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: min(94vw, 420px);
    touch-action: none;
  }
  .tile {
    aspect-ratio: 1;
    background: #2d3f6f;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(24px, 9vw, 42px);
    font-weight: 700;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s, transform 0.1s;
    position: relative;
  }
  .tile.active {
    background: #f59e0b;
    color: #1a1a2e;
    transform: scale(0.94);
  }
  .tile.active.valid {
    background: #4ade80;
  }
  .tile.active.invalid {
    background: #f87171;
  }
  .tile .order {
    position: absolute;
    top: 4px;
    right: 7px;
    font-size: 11px;
    font-weight: 600;
    opacity: 0.7;
  }
  #grid.disabled .tile { opacity: 0.35; }

  #currentWord {
    height: 34px;
    margin: 10px 0 4px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #f59e0b;
    transition: color 0.15s;
  }
  #currentWord.valid { color: #4ade80; }
  #currentWord.invalid { color: #f87171; }

  .word-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .word-actions button {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    color: #eee;
  }
  #validateBtn { background: #15803d; }
  #validateBtn:active { background: #16a34a; }
  #clearBtn { background: #6b3030; }
  #clearBtn:active { background: #8a3e3e; }
  #startBtn { background: #b45309; }
  #startBtn:active { background: #d97706; }

  #feedback { font-size: 13px; height: 18px; color: #f87171; margin-bottom: 6px; }
  #feedback.ok { color: #4ade80; }

  #wordList {
    width: min(94vw, 420px);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .word-chip {
    background: #16213e;
    border: 1px solid #444d7c;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .word-chip .pts { color: #7dd3fc; font-weight: 600; font-size: 12px; }
  .word-chip .del {
    color: #f87171;
    font-weight: 700;
    cursor: pointer;
    padding: 0 2px;
  }

  #endBanner {
    display: none;
    margin-top: 12px;
    padding: 12px 20px;
    background: #16213e;
    border: 1px solid #f59e0b;
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
  }
  #endBanner strong { color: #f59e0b; font-size: 22px; }
</style>
</head>
<body>

<h1>BOGGLE</h1>
<div class="dict-status" id="dictStatus">Chargement du dictionnaire…</div>

<div class="seed-row">
  <label for="seedInput">Grille n°</label>
  <input type="text" id="seedInput" inputmode="numeric" placeholder="ex : 42">
  <button id="loadSeedBtn">Charger</button>
  <button id="randomSeedBtn">🎲</button>
</div>

<div class="mode-row">
  <label for="scoreMode">Points :</label>
  <select id="scoreMode">
    <option value="simple">Simple (1 pt/lettre)</option>
    <option value="bonus">Bonus (+ nb mots + mot le plus long)</option>
    <option value="tournoi">Tournoi (barème officiel)</option>
  </select>
</div>

<div class="topbar">
  <div id="timer">3:00</div>
  <div id="score">0 pt</div>
</div>

<div id="grid" class="disabled"></div>

<div id="currentWord">&nbsp;</div>
<div class="word-actions">
  <button id="startBtn" class="primary">Démarrer</button>
  <button id="validateBtn">Valider</button>
  <button id="clearBtn">Effacer</button>
</div>
<div id="feedback">&nbsp;</div>

<div id="wordList"></div>

<div id="endBanner"></div>
