<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>Boggle entre amis</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<script src="js/app.js" defer></script>
</head>
<body>

<h1>BOGGLE ENTRE AMIS</h1>
<div class="dict-status" id="dictStatus">Chargement du dictionnaire…</div>

<div class="seed-row">
  <label for="seedInput">Grille n°</label>
  <input type="text" id="seedInput" inputmode="numeric" placeholder="ex : 42">
  <button id="loadSeedBtn">Charger</button>
  <button id="randomSeedBtn">🎲</button>
</div>

<div class="mode-row">
  <label for="scoreMode">Points :</label>
  <select id="scoreMode">
    <option value="simple">Simple (1 pt/lettre)</option>
    <option value="bonus">Bonus (+ nb mots + mot le plus long)</option>
    <option value="tournoi">Tournoi (barème officiel)</option>
  </select>
</div>

<div class="start-row">
  <button id="startBtn" class="primary">Démarrer</button>
</div>

<div class="topbar">
  <div id="timer">3:00</div>
  <div id="score">0 pt</div>
</div>

<div id="grid" class="disabled"></div>

<div id="currentWord">&nbsp;</div>
<div class="word-actions">
  <button id="validateBtn">Valider</button>
  <button id="clearBtn">Effacer</button>
</div>
<div id="feedback">&nbsp;</div>

<div id="wordList"></div>

<div id="endBanner"></div>

</body>
</html>
